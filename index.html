<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Smart Subtitle Generator</title>
<style>
body { font-family: Arial; padding: 20px; background: #111; color: white; }
button { padding: 10px; margin-top: 10px; }
</style>
</head>
<body>

<h2>Tạo SRT theo tiếng nói (lọc im lặng)</h2>

<input type="file" id="audioFile" accept="audio/*"><br>
<button onclick="processAudio()">Tạo SRT</button>

<p id="status"></p>

<script>
function formatTime(seconds) {
    let hrs = Math.floor(seconds / 3600);
    let mins = Math.floor((seconds % 3600) / 60);
    let secs = Math.floor(seconds % 60);
    let ms = Math.floor((seconds % 1) * 1000);

    return (
        String(hrs).padStart(2, '0') + ":" +
        String(mins).padStart(2, '0') + ":" +
        String(secs).padStart(2, '0') + "," +
        String(ms).padStart(3, '0')
    );
}

async function processAudio() {
    const file = document.getElementById("audioFile").files[0];
    if (!file) return alert("Chọn file trước");

    document.getElementById("status").innerText = "Đang phân tích...";

    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
    const arrayBuffer = await file.arrayBuffer();
    const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);

    const channelData = audioBuffer.getChannelData(0);
    const sampleRate = audioBuffer.sampleRate;

    const threshold = 0.02; // độ nhạy (có thể chỉnh)
    const minDuration = 2;  // tối thiểu 2 giây

    let srt = "";
    let index = 1;
    let isSpeaking = false;
    let startTime = 0;

    for (let i = 0; i < channelData.length; i += sampleRate / 10) {
        let volume = Math.abs(channelData[i]);
        let currentTime = i / sampleRate;

        if (volume > threshold && !isSpeaking) {
            isSpeaking = true;
            startTime = currentTime;
        }

        if (volume <= threshold && isSpeaking) {
            let endTime = currentTime;

            if ((endTime - startTime) >= minDuration) {
                srt += index + "\n";
                srt += formatTime(startTime) + " --> " + formatTime(endTime) + "\n";
                srt += " \n\n";
                index++;
            }

            isSpeaking = false;
        }
    }

    const blob = new Blob([srt], { type: "text/plain" });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);

    const originalName = file.name.replace(/\.[^/.]+$/, "");
    link.download = originalName + ".srt";
    link.click();

    document.getElementById("status").innerText = "Hoàn thành!";
}
</script>

</body>
</html>
